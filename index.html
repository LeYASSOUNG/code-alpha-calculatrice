<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Calculatrice — CodeAlpha</title>
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Outfit:wght@300;500;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>
<div class="wrapper">
  <div class="header-row">
    <span class="brand">CodeAlpha — Tâche 2</span>
    <div class="header-actions">
      <button id="btn-sci" class="btn-history" title="Mode Scientifique">🔬</button>
      <button id="btn-history" class="btn-history" title="Historique">🕒</button>
    </div>
  </div>

  <div class="main-container">
    <div class="calc">
      <div class="display">
      <div class="expression" id="expression"></div>
      <div class="result" id="result">0</div>
    </div>

    <div class="grid">
      <!-- Sci Row 1 (Hidden by default) -->
      <button class="btn btn-sci-op sci-hidden" data-action="sci" data-value="sin">sin</button>
      <button class="btn btn-sci-op sci-hidden" data-action="sci" data-value="cos">cos</button>
      <button class="btn btn-sci-op sci-hidden" data-action="sci" data-value="tan">tan</button>
      <button class="btn btn-sci-op sci-hidden" data-action="sci" data-value="sqrt">√</button>
      
      <!-- Sci Row 2 (Hidden by default) -->
      <button class="btn btn-sci-op sci-hidden" data-action="sci" data-value="log">log</button>
      <button class="btn btn-sci-op sci-hidden" data-action="sci" data-value="ln">ln</button>
      <button class="btn btn-op sci-hidden" data-action="op" data-value="^">^</button>
      <button class="btn btn-num sci-hidden" data-action="constant" data-value="Math.PI">π</button>

      <!-- Row 1 -->
      <button class="btn btn-clear" data-action="clear">AC</button>
      <button class="btn btn-sign"  data-action="sign">+/−</button>
      <button class="btn btn-pct"   data-action="percent">%</button>
      <button class="btn btn-op"    data-action="op" data-value="÷">÷</button>

      <!-- Row 2 -->
      <button class="btn btn-num" data-action="digit" data-value="7">7</button>
      <button class="btn btn-num" data-action="digit" data-value="8">8</button>
      <button class="btn btn-num" data-action="digit" data-value="9">9</button>
      <button class="btn btn-op"  data-action="op"    data-value="×">×</button>

      <!-- Row 3 -->
      <button class="btn btn-num" data-action="digit" data-value="4">4</button>
      <button class="btn btn-num" data-action="digit" data-value="5">5</button>
      <button class="btn btn-num" data-action="digit" data-value="6">6</button>
      <button class="btn btn-op"  data-action="op"    data-value="−">−</button>

      <!-- Row 4 -->
      <button class="btn btn-num" data-action="digit" data-value="1">1</button>
      <button class="btn btn-num" data-action="digit" data-value="2">2</button>
      <button class="btn btn-num" data-action="digit" data-value="3">3</button>
      <button class="btn btn-op"  data-action="op"    data-value="+">+</button>

      <!-- Row 5 -->
      <button class="btn btn-num btn-zero" data-action="digit" data-value="0">0</button>
      <button class="btn btn-num" data-action="decimal">.</button>
      <button class="btn btn-eq"  data-action="equals">=</button>
    </div>

    <p class="hint">⌨ Support clavier activé</p>
  </div>

  <div class="history-panel" id="history-panel">
    <div class="history-header">Historique</div>
    <div class="history-list" id="history-list">
      <div class="empty-hist">Aucun calcul récent</div>
    </div>
  </div>
  </div>
</div>

<script src="scripte.js" defer></script>
</body>
</html>
